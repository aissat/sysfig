name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version info
        id: info
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="latest-${COMMIT}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}"   >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"       >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${{ steps.info.outputs.version }} \
              -X main.commit=${{ steps.info.outputs.commit }} \
              -X main.buildDate=${{ steps.info.outputs.date }}" \
            -o "dist/sysfig-${{ matrix.suffix }}" \
            ./cmd/sysfig

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysfig-${{ matrix.suffix }}
          path: dist/sysfig-${{ matrix.suffix }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install nfpm
        run: |
          curl -Lo /usr/local/bin/nfpm \
            https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_linux_amd64
          chmod +x /usr/local/bin/nfpm

      - name: Build packages (.deb / .rpm / .apk)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for arch in amd64 arm64; do
            for fmt in deb rpm apk; do
              GOARCH=${arch} VERSION=${VERSION} \
                nfpm package \
                  --config contrib/pkg/nfpm.yaml \
                  --packager ${fmt} \
                  --target dist/
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sysfig-* sysfig_* > checksums.txt
          cat checksums.txt

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/sysfig-*
            dist/sysfig_*
            dist/checksums.txt

      - name: Publish latest (rolling)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "latest (main)"
          prerelease: true
          body: "Rolling build from the `main` branch. Updated on every push."
          files: |
            dist/sysfig-*
            dist/checksums.txt
