name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version info
        id: info
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="latest-${COMMIT}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}"   >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"       >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${{ steps.info.outputs.version }} \
              -X main.commit=${{ steps.info.outputs.commit }} \
              -X main.buildDate=${{ steps.info.outputs.date }}" \
            -o "dist/sysfig-${{ matrix.suffix }}" \
            ./cmd/sysfig

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysfig-${{ matrix.suffix }}
          path: dist/sysfig-${{ matrix.suffix }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for git-cliff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -qq
          sudo apt-get install -y nfpm

      - name: Build packages (.deb / .rpm / .apk)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for arch in amd64 arm64; do
            for fmt in deb rpm apk; do
              GOARCH=${arch} VERSION=${VERSION} \
                nfpm package \
                  --config contrib/pkg/nfpm.yaml \
                  --packager ${fmt} \
                  --target dist/
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sysfig-* sysfig_* > checksums.txt
          cat checksums.txt

      - name: Install git-cliff
        run: |
          curl -Lo /tmp/git-cliff.tar.gz \
            https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-musl.tar.gz
          tar -xzf /tmp/git-cliff.tar.gz -C /tmp
          sudo mv /tmp/git-cliff-*/git-cliff /usr/local/bin/

      - name: Generate changelog
        id: changelog
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Changelog from previous tag to this tag
            PREV=$(git tag --sort=-version:refname | sed -n '2p')
            if [ -n "$PREV" ]; then
              git cliff "${PREV}..HEAD" --config cliff.toml -o /tmp/CHANGELOG_RELEASE.md
            else
              git cliff --config cliff.toml -o /tmp/CHANGELOG_RELEASE.md
            fi
          else
            git cliff --unreleased --config cliff.toml -o /tmp/CHANGELOG_RELEASE.md
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/CHANGELOG_RELEASE.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/sysfig-*
            dist/sysfig_*
            dist/checksums.txt

      - name: Publish latest (rolling)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "latest (main)"
          prerelease: true
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/sysfig-*
            dist/sysfig_*
            dist/checksums.txt
