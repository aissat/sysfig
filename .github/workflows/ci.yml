name: CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -coverprofile=coverage.out -coverpkg=./... ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage profile
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  build_release:
    name: Build release artifacts
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set version info
        id: info
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION="latest-${COMMIT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}"   >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"       >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${{ steps.info.outputs.version }} \
              -X main.commit=${{ steps.info.outputs.commit }} \
              -X main.buildDate=${{ steps.info.outputs.date }}" \
            -o "dist/sysfig-${{ matrix.suffix }}" \
            ./cmd/sysfig

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: sysfig-${{ matrix.suffix }}
          path: dist/sysfig-${{ matrix.suffix }}

  publish_latest:
    name: Publish latest
    needs: build_release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for git-cliff)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v6.0.0
        with:
          path: dist
          merge-multiple: true

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -qq
          sudo apt-get install -y nfpm

      - name: Build packages (.deb / .rpm / .apk)
        run: |
          VERSION="latest"
          for arch in amd64 arm64; do
            cp dist/sysfig-linux-${arch} dist/sysfig-pkg
            for fmt in deb rpm apk; do
              GOARCH=${arch} VERSION=${VERSION} \
                nfpm package \
                  --config contrib/pkg/nfpm.yaml \
                  --packager ${fmt} \
                  --target dist/
            done
          done
          rm -f dist/sysfig-pkg

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sysfig-* sysfig_* > checksums.txt
          cat checksums.txt

      - name: Install git-cliff
        run: |
          VERSION="2.12.0"
          curl -LsSf \
            "https://github.com/orhun/git-cliff/releases/download/v${VERSION}/git-cliff-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            -o /tmp/git-cliff.tar.gz
          tar -xzf /tmp/git-cliff.tar.gz -C /tmp
          sudo install -m 0755 "/tmp/git-cliff-${VERSION}/git-cliff" /usr/local/bin/git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          git cliff --unreleased --config cliff.toml -o /tmp/CHANGELOG_RELEASE.md
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/CHANGELOG_RELEASE.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish latest (rolling)
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: latest
          name: "latest (main)"
          prerelease: true
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/sysfig-*
            dist/sysfig_*
            dist/checksums.txt
